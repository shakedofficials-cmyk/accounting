services:
  postgres:
    image: postgres:16-alpine
    container_name: shaked-finance-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shaked_finance_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
